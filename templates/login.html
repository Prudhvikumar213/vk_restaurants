<!DOCTYPE html>
<html>
<head>
    <title>Login - VK Restaurant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
        background-color: #333;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;  
    }
         header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 999; /* stays above all content */
  }
     
    
    .ord {
    background-color: #573666;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    border-bottom: solid 2px cyan;
    padding: 10px 20px;
  }

  .logo img {
    width: 60px;
    height: 60px;
    margin-left: 40%;
    border-radius: 50%;
  }

  .hh {
    color: #ffd966;
    font-size: 2rem;
    padding-left: 2%;
    flex: 1;
    text-shadow: 2px 2px 4px #000;
    margin: 0;
  }

  .user-actions {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .user-actions a {
    text-decoration: none;
    color: red;
    font-size: 1.1rem;
    font-weight: 600;
  }

  .user-actions img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
  }

  /* ---------- RESPONSIVE FIXES ---------- */
  @media (max-width: 768px) {
    .ord {
      justify-content: space-around;
      padding: 6px 8px;
    }

    .logo {
      width: 40px;
      height: 40px;
    }

    .hh {
      font-size: 1.4rem;
      flex: none;
    }

    .right img {
      width: 30px;
      height: 30px;
    }

    .logout {
      font-size: 12px;
      padding: 5px 8px;
    }
  }
        .login-container {
            display: flex;
            justify-content:left;
            align-items: center;
            height: calc(100vh - 120px);
            height: 100vh;
        }

        .login-box {
            background-color: rgb(3, 13, 22);
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            margin-left: 10%;
            border-bottom-left-radius: 30%;
            border-top-right-radius: 30%;
            

        }

        .login-box h2 {
            font-size: 2.5em;
            color: #573666;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Form Styles */
        form {
            display: flex;
            flex-direction: column;
        }

        form label {
            font-size: 150%;
            margin-bottom: 5px;
            color: #333;
            color: white;
        }

        form input[type="email"],
        form input[type="password"] {
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1em;
            color:bl;
        }

        form input[type="submit"] {
            padding: 12px;
            background-color: #573666;
            color: white;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        form input[type="submit"]:hover {
            background-color: #3d2550;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
        }

        .register-link a {
            color: #573666;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

         @media (min-width: 768px) {
            .login-container {
                justify-content: space-around;
                flex-direction: row;
                padding-top: 120px;
            }

            .side-image {
                display: block;
                width: 15%;
                height: auto;
            }

            .login-box h2 {
                font-size: 2.5em;
            }

            header h1 {
                font-size: 3em;
            }
        }

        @media (max-width: 480px) {
            header img {
                width: 40px;
                height: 40px;
            }

            header h1 {
                font-size: 1.8em;
            }

            .login-box {
                width: 90%;
                padding: 25px;
                border-radius: 20px;
                border-bottom-left-radius: 0%;
                border-top-right-radius: 0%;
            }

            .login-box h2 {
                font-size: 1.8em;
            }
        }
    </style>
    <link rel="icon" href="https://png.pngtree.com/png-clipart/20230623/original/pngtree-3d-login-button-icon-with-mouse-cursor-png-image_9205409.png">
    
</head>
<body >
     <header>
          <div class="ord">
            <div class="logo">
              <img src="https://png.pngtree.com/png-vector/20220824/ourmid/pngtree-initial-letter-vk-logo-template-design-initial-logo-illustration-vector-png-image_38857728.png" alt="VK Logo">
            </div>
        
            <h3 class="hh">Restaurants</h3>
        
            <div class="user-actions">
              <a href="profile" class="profile">
                <img src="https://static.vecteezy.com/system/resources/thumbnails/020/911/750/small/user-profile-icon-profile-avatar-user-icon-male-icon-face-icon-profile-icon-free-png.png" alt="Profile Icon">
              </a>
              <a href="logout" class="logout">Logout</a>
            </div>
          </div>
        </header>
        <div class="login-container">
            <img src="https://www.clipartmax.com/png/full/112-1129793_clip-art-dishes-in-sink.png" alt="image" width="5%" height="5%">
            <div style="background-color:#333;width: 50%; " class="login-box">
                <h2 style="font-size: 300%; color: white;">Login</h2>
                <form method="post">
                    <label>email:</label><br>
                    <input type="email" name="email" required><br><br>
                    <label >Password:</label><br>
                    <input type="password" name="password" required><br><br>
                    <input type="submit" value="Login">
                </form>
                <p style="color: white;">Don't have an account? <a href="/register" style="color: white;">Register here</a></p>
            </div>
            <img src="https://graphicsfamily.com/wp-content/uploads/edd/2021/06/Editable-Photoshop-Food-Logo-Design-PNG-Transparent-2048x2048.png" alt="image" width="5%" height="5%" style="align-items: bottom;">
        </div>
    <script>
        alert("{{ error }}");
    </script>
</body>
</html>
