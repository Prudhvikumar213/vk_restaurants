<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard - VK Restaurant</title>

    <style>
      header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 999; /* stays above all content */
  }
     
    
    .ord {
    background-color: #573666;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    border-bottom: solid 2px cyan;
    padding: 10px 20px;
  }

  .logo img {
    width: 60px;
    height: 60px;
    margin-left: 40%;
    border-radius: 50%;
  }

  .hh {
    color: #ffd966;
    font-size: 2rem;
    padding-left: 2%;
    flex: 1;
    text-shadow: 2px 2px 4px #000;
    margin: 0;
  }

  .user-actions {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .user-actions a {
    text-decoration: none;
    color: red;
    font-size: 1.1rem;
    font-weight: 600;
  }

  .user-actions img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
  }

  /* ---------- RESPONSIVE FIXES ---------- */
  @media (max-width: 768px) {
    .ord {
      justify-content: space-around;
      padding: 6px 8px;
    }

    .logo {
      width: 40px;
      height: 40px;
    }

    .hh {
      font-size: 1.4rem;
      flex: none;
    }

    .right img {
      width: 30px;
      height: 30px;
    }

    .logout {
      font-size: 12px;
      padding: 5px 8px;
    }
  }
    body {
      font-family: Arial, sans-serif;
      background-color: #eee;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .form-container, .items-container {
      background-color: white;
      padding: 20px;
      margin: 20px auto;
      border-radius: 10px;
      width: 80%;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input[type="text"], input[type="number"], select {
      width: calc(100% - 20px);
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      background-color: #573666;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    .item {
      display: inline-block;
      width: 250px;
      background: #f9f9f9;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 2px 5px 10px rgba(0, 0, 0, 0.1);
      text-align: center;
      vertical-align: top;
    }

    .item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .item-title {
      font-weight: bold;
      margin: 10px 0 5px;
    }

    .item-price {
      color: green;
      font-weight: bold;
    }

    .remove-btn {
      background-color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>

    <header>
      <div class="ord">
        <div class="logo">
          <img src="https://png.pngtree.com/png-vector/20220824/ourmid/pngtree-initial-letter-vk-logo-template-design-initial-logo-illustration-vector-png-image_38857728.png" alt="VK Logo">
        </div>
    
        <h3 class="hh">Restaurants</h3>
    
        <div class="user-actions">
          <a href="profile" class="profile">
            <img src="https://static.vecteezy.com/system/resources/thumbnails/020/911/750/small/user-profile-icon-profile-avatar-user-icon-male-icon-face-icon-profile-icon-free-png.png" alt="Profile Icon">
          </a>
          <a href="logout" class="logout">Logout</a>
        </div>
      </div>
    </header>
  
    <h2 style="margin-top:10%">Welcome, Admin: {{ email }}</h2> <a href="/logout" style="text-decoration: none;"><button style="margin-left: 85%;">Logout </button></a>
    <div class="form-container">
      <a href="foodmenu"><button style="margin-left: 45%;">open menu </button></a>
      <h3>Add Menu Item</h3>
      <form action="/add_item" method="POST">
          <label>Category:</label>
          <select name="category">
              {% for category in categories %}
                  <option value="{{ category }}">{{ category|capitalize }}</option>
              {% endfor %}
          </select><br><br>

          <label>Name:</label><br>
          <input type="text" name="name" required><br><br>

          <label>Price:</label><br>
          <input type="number" name="price" step="0.01" required><br><br>

          <label>Image URL:</label><br>
          <input type="text" name="image_url" required><br><br>

          <button type="submit">Add Item</button>
      </form>
    </div>
    <hr>
    <div class="form-container">
      <h3>Remove Menu Item</h3>
      <form action="/remove_item" method="POST">
          <label>Category:</label>
          <select name="category">
              {% for category in categories %}
                  <option value="{{ category }}">{{ category|capitalize }}</option>
              {% endfor %}
          </select><br><br>

          <label>Item Name:</label><br>
          <input type="text" name="name" required><br><br>

          <button type="submit">Remove Item</button>
      </form>
    </div>

    <br>
    
    
</body>
</html>
