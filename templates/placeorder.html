<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Confirmation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: auto;
      padding: 20px;
      background-color: #f4f4f4;
    }

    header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 999; /* stays above all content */
  }
     
    
    .ord {
    background-color: #573666;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    border-bottom: solid 2px cyan;
    padding: 10px 20px;
  }

  .logo img {
    width: 60px;
    height: 60px;
    margin-left: 40%;
    border-radius: 50%;
  }

  .hh {
    color: #ffd966;
    font-size: 2rem;
    padding-left: 2%;
    flex: 1;
    text-shadow: 2px 2px 4px #000;
    margin: 0;
  }

  .user-actions {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .user-actions a {
    text-decoration: none;
    color: red;
    font-size: 1.1rem;
    font-weight: 600;
  }

  .user-actions img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
  }

  /* ---------- RESPONSIVE FIXES ---------- */
  @media (max-width: 768px) {
    .ord {
      justify-content: space-around;
      padding: 6px 8px;
    }

    .logo {
      width: 40px;
      height: 40px;
    }

    .hh {
      font-size: 1.4rem;
      flex: none;
    }

    .right img {
      width: 30px;
      height: 30px;
    }

    .logout {
      font-size: 12px;
      padding: 5px 8px;
    }
  }

    

    h1 {
      color: #333;
      text-align: center;
    }

    .order-summary {
      background: white;
      padding: 20px;
      border-radius: 6px;
      margin-top: 20px;
    }

    .order-item {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid #ddd;
    }

    .order-item:last-child {
      border-bottom: none;
    }

    .order-total {
      text-align: right;
      font-size: 18px;
      font-weight: bold;
      margin-top: 20px;
    }

    @media (max-width: 768px) {
    .order-summary {
        padding: 15px;
        margin: 10px;
        border-radius: 10px;
    }

    .order-item {
        flex-direction: column;
        align-items: flex-start;
        padding: 10px 0;
    }

    .order-item span {
        margin-bottom: 5px;
        font-size: 0.95em;
    }

    .order-total {
        text-align: center;
        font-size: 16px;
        margin-top: 15px;
    }

    h1 {
        font-size: 1.8em;
    }
}

@media (max-width: 480px) {
    .order-summary {
        padding: 10px;
        margin: 5px;
    }

    .order-item {
        flex-direction: column;
        gap: 3px;
        padding: 8px 0;
    }

    .order-item span {
        font-size: 0.9em;
    }

    .order-total {
        font-size: 15px;
    }

    h1 {
        font-size: 1.5em;
    }
}
  </style>
</head>
<body>

  <header>
      <div class="ord">
        <div class="logo">
          <img src="https://png.pngtree.com/png-vector/20220824/ourmid/pngtree-initial-letter-vk-logo-template-design-initial-logo-illustration-vector-png-image_38857728.png" alt="VK Logo">
        </div>
    
        <h3 class="hh">Restaurants</h3>
    
        <div class="user-actions">
          <a href="profile" class="profile">
            <img src="https://static.vecteezy.com/system/resources/thumbnails/020/911/750/small/user-profile-icon-profile-avatar-user-icon-male-icon-face-icon-profile-icon-free-png.png" alt="Profile Icon">
          </a>
          <a href="logout" class="logout">Logout</a>
        </div>
      </div>
    </header>

  <h1 style="margin-top:15%">Order Placed Successfully!</h1>
  <div class="order-summary">
    <h2>Order Summary:</h2>
    <div id="order-items"></div>
    <div id="order-total" class="order-total"></div>
  </div>
  <a href="foodmenu" style="padding-left: 40%;"> <button  style="color: #333;"><b>back to menu </b></button></a>

  <script>
    const orderData = JSON.parse(localStorage.getItem('orderData')) || [];

    const itemsContainer = document.getElementById('order-items');
    const totalDiv = document.getElementById('order-total');

    let total = 0;

    orderData.forEach(item => {
      total += item.price * item.quantity;

      const itemDiv = document.createElement('div');
      itemDiv.className = 'order-item';
      itemDiv.innerHTML = `
        <span>${item.name} × ${item.quantity}</span>
        <span>₹${(item.price * item.quantity).toFixed(2)}</span>
      `;
      itemsContainer.appendChild(itemDiv);
    });

    totalDiv.textContent = `Total: ₹${total.toFixed(2)}`;

    // Optional: Clear cart after placing the order
    localStorage.removeItem('cart');
  </script>

</body>
</html>
