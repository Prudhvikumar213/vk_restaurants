<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Confirmation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: auto;
      padding: 20px;
      background:radial-gradient(circle at right,#4a004d 0%,#250027 35%,#170018 70%,#0d0010 100%);
    }
    html{
    margin: 0;
    padding: 0;
    overflow-x: hidden;   /* Hide left/right scrolling */
    overflow-y: auto;
    }
     header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 999; /* stays above all content */
  }
  .ord {
    
    background: linear-gradient(90deg, #2C1220 0%, #201221 50%, #241224 100%);

    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    border-bottom: 3px solid #A33F15;
    padding: 10px 20px;
  }

  .logo img {
    width: 80px;
    height: 80px;
    margin-left: 40%;
    border-radius: 50%;
    padding-left: 10%;

  }

  .hh {
    color: #F0B63A;
    font-size: 2rem;
    padding-left: -2%;
    flex: 1;
    text-shadow: 2px 2px 4px #000;
    margin: 0;
    padding-bottom: 0%;
    margin-bottom: 0%;
    text-align: center;
    width: 30%;
    
  }
  .hh p{
    font-size: 45%;
    margin-top: 0%;
    padding-top: 0%;
    text-align: center;
    color: #F0B63A;
  }

  .user-actions {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .user-actions a {
    text-decoration: none;
    color: red;
    font-size: 1.1rem;
    font-weight: 600;
  }

  .user-actions img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
  }

    h1 {
      color:white;
      text-align: center;
      margin-top: 15%;
      
    }

    .order-summary {
      background:black;
      color: whitesmoke;
      padding: 20px;
      border-radius: 6px;
      margin-top: 20px;
    }

    .order-item {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid #ddd;
    }

    .order-item:last-child {
      border-bottom: none;
    }

    .order-total {
      text-align: right;
      font-size: 18px;
      font-weight: bold;
      margin-top: 20px;
      border-top: 1px solid #ccc;
      padding-top: 2%;
    }
    .order-item{
    display: flex;
    align-items: center;
    justify-content:space-between;
    padding: 1px;
    border-bottom: 1px solid #ccc;
    

}

.order-img{
    width: 50px;
    height: 50px;
    object-fit: cover;
    border-radius: 8px;
    padding-left: 8%;
  

}
button{
        background:#FF8C00;
        border:1PX solid #E65100;
        outline: none;
        width: 40%;
      
        margin-bottom: 3%;
        font-weight: bold;
        color: whitesmoke;
        border-radius: 50px;
        box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        margin-left: 30%;
        margin-top: 5%;
        height:50px;
        
        
    }
  </style>
</head>
<body>
  <header>
          <div class="ord">
            <div class="logo">
              <img src="https://cdn.corenexis.com/f/wyKdaZ54fUE.png" alt="logo">
            </div>
        
            <h3 class="hh"> VK Restaurants
                <p><i class="fa-solid fa-leaf" style="color: green;"></i> Good Food, Great Moments <i class="fa-solid fa-leaf" style="color: green;"></i></p>
            </h3>
            
        
            <div class="user-actions">
              <a href="profile" class="profile">
                <i class="fa-regular fa-circle-user"></i>
                
              </a>
             
            </div>
          </div>
    </header> 

  <h1>Order Placed Successfully!</h1>
  <div class="order-summary">
    <h2 style="text-align: center;">Order Summary:</h2>
    <div id="order-items"></div>
    <div id="order-total" class="order-total"></div>
  </div>
  <button onclick="backToMenu() " style="height: fit-content;">back to menu</button>

  <script>
    const orderData = JSON.parse(localStorage.getItem('orderData')) || [];

    const itemsContainer = document.getElementById('order-items');
    const totalDiv = document.getElementById('order-total');

    let total = 0;

    orderData.forEach(item => {
      total += item.price * item.quantity;

      const itemDiv = document.createElement('div');
      itemDiv.className = 'order-item';
      itemDiv.innerHTML = `
         <img src="${item.image}" class="order-img">
        <span>${item.name} × ${item.quantity}</span>
        <span>₹${(item.price * item.quantity).toFixed(2)}</span>
      `;
      itemsContainer.appendChild(itemDiv);
    });

    totalDiv.textContent = `Total: ₹${total.toFixed(2)}`;

    // Optional: Clear cart after placing the order
    localStorage.removeItem('cart');
  </script>
  <script>
function backToMenu() {
    window.location.href = "{{ url_for('foodmenu') }}";
}
</script>

</body>
</html>
